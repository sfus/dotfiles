# herdr configuration (symlinked to ~/.config/herdr/config.toml)
# Ported from the previous tmux setup (terminal/tmux/.tmux.conf) as far as
# herdr's named actions allow. This is a selective mapping, not a 1:1 port.

# Skip the first-run onboarding notification.
onboarding = false

[keys]
# Prefix key. Matches tmux's C-q so the existing muscle memory carries over.
prefix = "ctrl+q"                    # default: Ctrl-b

# --- Pane splits ---
# tmux used `|` for a vertical (left/right) split and `-` for horizontal.
# herdr cannot bind `|`, so vertical stays on the default `v`.
split_vertical = "prefix+v"
split_horizontal = "prefix+minus"

# --- Pane focus (emacs-style, mirrors tmux prefix C-b/n/p/f) ---
focus_pane_left = "prefix+ctrl+b"    # default: Prefix + h
focus_pane_down = "prefix+ctrl+n"    # default: Prefix + j
focus_pane_up = "prefix+ctrl+p"      # default: Prefix + k
focus_pane_right = "prefix+ctrl+f"   # default: Prefix + l

# --- Pane cycle (prefixless direct shortcuts) ---
cycle_pane_next = "alt+o"            # default: Prefix + Tab
cycle_pane_previous = "alt+shift+o"  # default: Prefix + Shift-Tab

# --- Pane resize / zoom / close ---
# reload stays on the herdr default prefix+shift+r, so the frequently used
# resize gesture takes tmux's `prefix r` slot instead.
resize_mode = "prefix+r"
zoom = "prefix+z"
close_pane = "prefix+x"

# --- Tabs (tmux windows) ---
# new_tab is the prefixless direct shortcut ctrl+t, matching tmux's C-t.
new_tab = "ctrl+t"                   # default: Prefix + c
next_tab = "prefix+n"
previous_tab = "prefix+p"
switch_tab = "prefix+1..9"
close_tab = "prefix+k"               # default: Prefix + X
rename_tab = "prefix+comma"          # default: Prefix + T

# --- Workspaces (tmux sessions) ---
new_workspace = "prefix+ctrl+w"      # default: Prefix + N
next_workspace = "ctrl+alt+j"        # prefixless direct shortcut
previous_workspace = "ctrl+alt+k"    # prefixless direct shortcut
workspace_picker = "prefix+w"
close_workspace = "prefix+ctrl+k"    # default: Prefix + D

# --- Agents (agent panel navigation) ---
next_agent = "alt+shift+j"           # default: unset
previous_agent = "alt+shift+k"       # default: unset

# --- Misc ---
detach = "prefix+d"                  # default: Prefix + q
reload_config = "prefix+shift+r"
toggle_sidebar = "prefix+b"

# Note: tmux's copy-mode (M-V / prefix [) is intentionally omitted. herdr has
# no `copy_mode` action in its config schema (see `herdr --default-config`),
# so binding it would be invalid. Scrollback editing is available via the
# default edit_scrollback = "prefix+e".

# dagg toggle-dashboard — jump to / from the dagg-dashboard tab in the current
# herdr workspace (toggles back to the previously focused tab).
[[keys.command]]
key = "alt+;"                        # mirrors the tmux Alt-; binding
type = "shell"                       # run in the background; does not occupy the terminal
command = "dagg toggle-dashboard"

[theme]
# TokyoNight, matching the previous tmux window-active-style colors.
name = "tokyo-night"

[terminal]
# Match tmux's default-shell/-command.
default_shell = "/bin/zsh"
# Login shell on macOS (like tmux's reattach-to-user-namespace -l).
shell_mode = "auto"

[ui]
# Create new tabs immediately with a generated name instead of prompting.
prompt_new_tab_name = false
# Accent roughly stands in for the tmux status colour31.
accent = "cyan"
# tmux `mouse on` equivalent.
mouse_capture = true
mouse_scroll_lines = 3
pane_borders = true
pane_gaps = true

# Show detected/reported agent labels (e.g. "claude", "codex", "planner") on
# split pane borders when no manual pane name is set. Set to false to hide them.
show_agent_labels_on_pane_borders = true
[experimental]
# Switch the macOS input source to ASCII while prefix mode is active so
# ctrl+q prefix commands still register with a CJK IME turned on.
switch_ascii_input_source_in_prefix = true

[advanced]
# 10 MiB per pane. tmux used history-limit 10000 (lines); this is well beyond.
scrollback_limit_bytes = 10485760

[ui.toast]
delivery = "herdr"
